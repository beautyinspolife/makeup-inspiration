    function renderLook(look) {
  const hasProducts = Array.isArray(look.products) && look.products.length > 0;

  return `
    <div class="page">
      <section class="hero-card">
        <div class="top-home-banner-wrap">
          <a class="top-home-banner" href="#/natural-makeup-inspo-sephora-us">See More Makeup Inspiration</a>
        </div>

        <img src="${look.heroImage || look.homeImage}" alt="${look.title}">
        <div class="hero-overlay"></div>

        <div class="hero-intro">
          <p class="hero-kicker">${look.title}</p>
          <div class="hero-divider"></div>
          <p class="hero-subtitle">Shop My Beauty Finds</p>
          <p class="hero-caption">Tap a product below to view it on the official website</p>
          <div class="hero-divider"></div>
        </div>
      </section>

      <main class="products-wrap">
        ${hasProducts ? `
          <section class="products-grid">
            ${look.products.map(product => `
              <a class="product-card-link"
                 href="#"
                 onclick="openProductLink('${String(getProductLink(product)).replace(/'/g, "\\'")}'); return false;">
                <div class="product-card">
                  <div class="product-image-box">
                    <img src="${product.image}" alt="${product.name}">
                  </div>
                  <p class="product-name">${product.name}</p>
                </div>
              </a>
            `).join("")}
          </section>
        ` : `
          <div class="empty-box">
            <p>Shop this look soon</p>
            <p>The full beauty selection for this makeup inspiration is coming soon.</p>
          </div>
        `}

        <div class="bottom-home-btn-wrap">
          <a class="bottom-home-btn" href="#/natural-makeup-inspo-sephora-us">See More Makeup Inspiration</a>
        </div>
      </main>
    </div>
  `;
}
function renderPerfume(look) {
  return `
    <div style="min-height:100vh; background:#e4e2dd; padding:18px 0 70px;">
      <main style="width:min(980px, calc(100% - 28px)); margin:0 auto;">

        <div style="display:flex; justify-content:center; margin:18px 0 28px;">

          >
            See More Perfume Inspiration

        </div>

        <h1 style="text-align:center; font-size:clamp(2.2rem, 7vw, 4.8rem); font-weight:500; letter-spacing:-0.03em; margin:22px 0 32px; color:#1f1a17;">
          Perfume Inspiration
        </h1>

        <div style="background:#f7f4ef; border-radius:34px; padding:18px; box-shadow:0 18px 45px rgba(0,0,0,0.10); width:min(720px, 100%); margin:0 auto;">
          <img 
            src="${look.heroImage || look.homeImage}" 
            alt="Perfume Inspiration"
            style="width:100%; max-height:78vh; object-fit:cover; border-radius:26px; background:#f7f4ef;"
          >
        </div>

        <div style="display:flex; justify-content:center; margin:44px 0 20px;">
          <a 
            href="#/all-perfumes-sephora-us"
            style="display:inline-flex; align-items:center; justify-content:center; background:#ffffff; color:#1f1a17; padding:16px 28px; border-radius:999px; font-family:Arial, Helvetica, sans-serif; font-size:18px; font-weight:700; letter-spacing:0.03em; box-shadow:0 12px 28px rgba(0,0,0,0.10); text-align:center;"
          >
            See More Perfume Inspiration
          </a>
        </div>

      </main>
    </div>
  `;
    }
    
    function openProductLink(url) {
  const cleaned = String(url || "").trim();
  if (!cleaned) return;

  const finalUrl = cleaned.startsWith("https://")
    ? cleaned
    : `https://${cleaned.replace(/^https?:\/\//, "")}`;

  window.location.assign(finalUrl);
}
        function render() {
  const slug = getSlugFromHash();
  const look = LOOKS.find(item => item.slug === slug);
  const app = document.getElementById("app");

  if (slug === "" || slug === "/" || slug === "home") {
    state.category = "natural";
    state.perfumeSubcategory = "all";
    app.innerHTML = renderHome();
    return;
  }

  if (perfumeSubcategoryRoutes[slug]) {
    state.category = "perfume";
    state.perfumeSubcategory = perfumeSubcategoryRoutes[slug];
    app.innerHTML = renderHome();
    return;
  }

  if (categoryRoutes[slug]) {
    state.category = categoryRoutes[slug];
    state.perfumeSubcategory = "all";
    app.innerHTML = renderHome();
    return;
  }

  if (look) {
    app.innerHTML = look.category === "perfume"
      ? renderPerfume(look)
      : renderLook(look);
    return;
  }

  state.category = "natural";
  state.perfumeSubcategory = "all";
  app.innerHTML = renderHome();
    }
    window.addEventListener("hashchange", render);

render();
