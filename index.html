    const productsByCode = {};
    (typeof products !== "undefined" ? products : []).forEach((p) => {
      if (p && p.code) productsByCode[p.code] = p;
    });

    // Counts how often each product code appears across looks matching `filterLook`.
    function tallyUsage(filterLook) {
      const counts = {};
      LOOKS.forEach((look) => {
        if (!filterLook(look)) return;
        (look.productCodes || []).forEach((code) => {
          counts[code] = (counts[code] || 0) + 1;
        });
      });
      return counts;
    }

    // Top N real products used across matching looks, topped up from the
    // catalog (by category/brand) if the look pool doesn't yield enough.
    function pickProductsByUsage(filterLook, count, fallbackFilter, mustMatch) {
      const counts = tallyUsage(filterLook);
      let ranked = Object.keys(counts)
        .sort((a, b) => counts[b] - counts[a])
        .map((code) => productsByCode[code])
        .filter(Boolean);

      if (mustMatch) ranked = ranked.filter(mustMatch);

      // Dedupe by real Sephora link — the catalog sometimes lists the same
      // physical product under more than one category code.
      const seen = new Set();
      const dedupedRanked = [];
      for (const p of ranked) {
        const linkKey = p.link || p.links?.US || p.code;
        if (seen.has(linkKey)) continue;
        seen.add(linkKey);
        dedupedRanked.push(p);
      }

      const picks = dedupedRanked.slice(0, count);

      if (picks.length < count && fallbackFilter) {
        const extra = (typeof products !== "undefined" ? products : [])
          .filter((p) => fallbackFilter(p) && !seen.has(p.link || p.links?.US || p.code));
        for (const p of extra) {
          if (picks.length >= count) break;
          const linkKey = p.link || p.links?.US || p.code;
          picks.push(p);
          seen.add(linkKey);
        }
      }
      return picks.slice(0, count);
    }

    // Top N real catalog products for a category/brand, prioritizing ones
    // actually used in at least one look (proven, non-random relevance).
    function pickProductsByCatalog(catalogFilter, count) {
      const usageCounts = tallyUsage(() => true);
      const matches = (typeof products !== "undefined" ? products : []).filter(catalogFilter);
      const ranked = [...matches].sort((a, b) => (usageCounts[b.code] || 0) - (usageCounts[a.code] || 0));

      // The catalog sometimes lists the same real product under more than one
      // category code (e.g. an eyeshadow palette filed under both "Eyeshadow"
      // and "Eyeshadow Palettes"). Dedupe by its real Sephora link so it never
      // appears twice in the same list.
      const seenLinks = new Set();
      const deduped = [];
      for (const p of ranked) {
        const linkKey = p.link || p.links?.US || p.code;
        if (seenLinks.has(linkKey)) continue;
        seenLinks.add(linkKey);
        deduped.push(p);
      }
      return deduped.slice(0, count);

      let hash = 0;

    function buildLipCombos(count) {
      const liners = pickProductsByCatalog(catCat("Makeup > Lip > Lip Liner"), 20);
      const colors = pickProductsByCatalog((p) => p.category === "Makeup > Lip > Lipstick" || p.category === "Makeup > Lip > Liquid Lipstick", 20);
      const glosses = pickProductsByCatalog((p) => p.category === "Makeup > Lip > Lip Gloss" || p.category === "Makeup > Lip > Lip Oil", 20);
      const combos = [];
      const max = Math.min(count, liners.length, colors.length, glosses.length);
      for (let i = 0; i < max; i++) {
        combos.push({
          liner: liners[i],
          color: colors[i],
          gloss: glosses[i]
        });

function getProductLink(product) {

// Resolves which image/link/shade to show for a product: a look-pinned
// shade (displayImage/displayLink/displayShade, set in data.js) takes
// priority, then the first declared variant, then the base product fields.
// With zero variants declared (today's state for all products), this is a
// no-op passthrough — nothing visually changes until real shades are added.
function getDisplayFields(product) {
  if (product.displayImage || product.displayLink) {
    return {
      image: product.displayImage || product.image,
      link: product.displayLink || product.link,
      shade: product.displayShade || ""
    };
  }
  if (Array.isArray(product.variants) && product.variants.length) {
    const v = product.variants[0];
    return { image: v.image || product.image, link: v.link || product.link, shade: v.shade || "" };
  }
  return { image: product.image, link: product.link, shade: "" };
}

window.__variantRegistry = window.__variantRegistry || {};

// Called from a shade <select>. Swaps the image, shade label, and Shop Now
// link for that one product card — no full re-render needed.
function switchProductShade(cardId, shadeName) {
  const variants = window.__variantRegistry[cardId];
  if (!variants) return;
  const variant = variants.find((v) => v.shade === shadeName);
  if (!variant) return;

  const card = document.getElementById(cardId);
  if (!card) return;

  const img = card.querySelector("img");
  if (img && variant.image) img.src = variant.image;

  const shadeLabel = card.querySelector(".product-shade");
  if (shadeLabel) shadeLabel.textContent = "Shade: " + variant.shade;

  const btn = card.querySelector(".shop-now-btn");
  if (btn && variant.link) {
    const safeLink = String(variant.link).replace(/'/g, "\\'");
    btn.setAttribute("onclick", "openProductLink('" + safeLink + "')");
  }
}

// Renders the shade <select> for a product card and registers its variants
// so switchProductShade can look them up without re-serializing JSON inline.
function renderShadeSelector(product, cardId, currentShade) {
  if (!Array.isArray(product.variants) || product.variants.length < 2) return "";
  window.__variantRegistry[cardId] = product.variants;
  return `
    <select class="shade-select" onchange="switchProductShade('${cardId}', this.value)">
      ${product.variants.map(v => `
        <option value="${v.shade}" ${v.shade === currentShade ? "selected" : ""}>${v.shade}</option>
      `).join("")}
    </select>
  `;
}

        ? pool.filter(item => item.category === look.category && item.subcategory === look.subcategory)
