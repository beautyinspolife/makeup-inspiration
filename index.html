<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauty Inspo</title>
  <style>
    :root {
      --bg: #e4e2dd;
      --bg-soft: #faf8f5;
      --card: #ffffff;
      --text: #1f1a17;
      --muted: #6f655d;
      --line: rgba(31, 26, 23, 0.12);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      --radius-xl: 30px;
      --radius-lg: 22px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
    }

    img { display: block; width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .page {
      min-height: 100vh;
      width: 100%;
    }

    .container {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 40px;
    }
  
    
    .logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 0;
      background: transparent;
      padding: 0;
    }
   
    .logo {
      max-width: 760px;
      width: 100%;
      height: auto;
     object-fit: contain;
      background: #dcd8d2;
    }


    .section-line {
      border-top: 1.5px solid var(--line);
      margin-top: 28px;
      padding-top: 26px;
    }
    
    
    .title {
      text-align: center;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 500;
      letter-spacing: -0.03em;
      margin: 30px 0 0;
    }
    

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .tab {
      border: 0;
      background: rgba(31, 26, 23, 0.08);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .tab.active {
      background: var(--text);
      color: white;
    }

    /* HOME */
    .grid {
      column-count: 2;
      column-gap: 14px;
      margin-top: 28px;
    }

    .home-card {
      display: inline-block;
      width: 100%;
      margin: 0 0 14px;
      break-inside: avoid;
      transition: transform 0.22s ease;
    }

    .home-card:hover { transform: translateY(-4px); }

    .home-card img {
      width: 100%;
      object-fit: cover;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      background: #ddd3c7;
    }

    .home-card:nth-child(3n) { transform: translateY(8px); }
    .home-card:nth-child(4n) { transform: translateY(-6px); }
    .home-card:nth-child(5n) { transform: translateY(4px); }

    .footer-note {
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 0.72rem;
      color: var(--muted);
      border-top: 1px solid var(--line);
      margin-top: 34px;
      padding-top: 20px;
    }

    /* LOOK PAGE */
    .products-wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      padding: 10px 15px;
      font-size: 0.92rem;
      margin: 16px 0 0;
      position: relative;
      z-index: 5;
      box-shadow: 0 8px 18px rgba(0,0,0,0.04);
    }
    
    .hero-card {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 100vh;
      min-height: 100vh;
      background: #d4cec2;
      }
      
    .hero-card img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    
    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(212, 206, 194, 0) 0%,
          rgba(212, 206, 194, 0.08) 18%,
          rgba(212, 206, 194, 0.18) 30%,
          rgba(212, 206, 194, 0.35) 42%,
          rgba(212, 206, 194, 0.58) 54%,
          rgba(212, 206, 194, 0.8) 66%,
          rgba(212, 206, 194, 0.94) 78%,
          rgba(212, 206, 194, 1) 88%,
          rgba(212, 206, 194, 1) 100%
        );
      z-index: 1;
      pointer-events: none;
    }
    
    .hero-title-box {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 30px 22px 34px;
      text-align: center;
      z-index: 10;
    }

    .hero-title {
      margin: 0 auto;
      max-width: 960px;
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      line-height: 1.12;
      font-weight: 500;
      color: #171311;
    }
    
    .hero-intro {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translateX(-50%);
      width: min(90%, 1000px);
      text-align: center;
      color: #ffffff;
      z-index: 10;
    }

    .hero-kicker,
    .hero-divider,
    .hero-subtitle,
    .hero-caption {
      position: relative;
      z-index: 11;
    }
    
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: -40px;
      position: relative;
      z-index: 3;
    }

    .product-card {
      background: #ffffff;
      border-radius: 28px;
      padding: 14px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.05);
      transition: transform 0.22s ease;
      height: 100%;
      border: none;
    }

    .product-card:hover { transform: translateY(-4px); }

    .product-image-box {
      background: #ffffff;
      border-radius: 22px;
      min-height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow: hidden;
      border: none;
    }

    .product-image-box img {
      max-height: 210px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
    }

    .product-name {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.92rem;
      line-height: 1.45;
      text-align: center;
      margin: 14px 4px 4px;
      color: #2e2925;
    }

    .empty-box {
      background: #ffffff;
      border-radius: 28px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.05);
      margin-top: 28px;
    }

    .empty-box p:first-child {
      font-size: 1.5rem;
      margin: 0 0 10px;
    }

    .empty-box p:last-child {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    
    .hero-kicker {
      margin: 0;
      font-size: 4.1rem;
      letter-spacing: 0.08em;
      font-weight: 500;
      text-transform: uppercase;
    }
    
    .hero-divider {
      width: 100%;
      height: 1.5px;
      background: rgba(255, 255, 255, 0.88);
      margin: 14px 0;
    }
    
    .hero-subtitle {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(1rem, 2.7vw, 1.5rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: none;
    }
    
    .hero-caption {
      margin: 14px 0 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(0.68rem, 1.9vw, 0.9rem);
      letter-spacing: 0.18em;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.92);
    }
    
    .hero-title-box {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 30px 22px 34px;
      text-align: center;
      z-index: 5;
    }
    
    .hero-title {
      margin: 0 auto;
      max-width: 760px;
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      line-height: 1.12;
      font-weight: 500;
      color: #171311;
    }
    
    @media (max-width: 759px) {
      .hero-intro {
        top: 16%;
        width: min(88%, 460px);
      }
    }
    
    @media (min-width: 760px) {
      .container { width: min(1180px, calc(100% - 56px)); }
      .grid { column-count: 3; column-gap: 18px; }
      .home-card { margin-bottom: 18px; }
      .products-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; }
      .logo { max-width: 420px; }
      .products-wrap { width: min(1180px, calc(100% - 56px)); }
    }

    @media (max-width: 759px) {
      .hero-card,
      .hero-card img {
        min-height: 64vh;
        height: 64vh;
      }
    }
  </style>
</head>

    const state = {
      category: "natural"
    };

    function shuffleArray(array) {
      const cloned = [...array];
      for (let i = cloned.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
      }
      return cloned;
    }

    function getSlugFromHash() {
      return location.hash.replace(/^#\/?/, "").trim();
    }

    function setCategory(category) {
      state.category = category;
      render();
    }

    function renderHome() {
      const filtered = LOOKS.filter(look => look.category === state.category);
      const randomOrder = shuffleArray(filtered);

      return `
        <div class="page">
          <main class="container">
            <div class="logo-wrap">
              <img class="logo" src="images/beauty-inspo-logo.png" alt="Beauty Inspo logo">
            </div>
                
          
          <section class="section-line">
            <div class="tabs">
              <button class="tab ${state.category === "natural" ? "active" : ""}" onclick="setCategory('natural')">Natural Makeup Inspo</button>
              <button class="tab ${state.category === "glam" ? "active" : ""}" onclick="setCategory('glam')">Glam Makeup Looks</button>
            </div>
            <h1 class="title">Makeup Inspiration</h1>
          </section>

            <section class="grid">
              ${randomOrder.map((look) => `
                <a class="home-card" href="#/${look.slug}" aria-label="${look.title}">
                  <img src="${look.homeImage}" alt="${look.title}">
                </a>
              `).join("")}
            </section>

            <div class="footer-note">Minimal beauty inspiration</div>
          </main>
        </div>
      `;
    }

    function renderLook(look) {
      const hasProducts = Array.isArray(look.products) && look.products.length > 0;

      return `
        <div class="page">
          <div class="products-wrap">
            <a class="back-btn" href="#/">← Back to Home</a>
          </div>
          
            <section class="hero-card">
              <img src="${look.heroImage || look.homeImage}" alt="${look.title}">
              <div class="hero-overlay"></div>
              <div class="hero-intro">
                <p class="hero-kicker">Beauty Inspiration</p>
                <div class="hero-divider"></div>
                <p class="hero-subtitle">Shop My Beauty Finds</p>
                <p class="hero-caption">Tap a product below to view it on the official website</p>
                <div class="hero-divider"></div>
              </div>
            </section>
          
          <main class="products-wrap">
            ${hasProducts ? `
              <section class="products-grid">
                ${look.products.map(product => `
                  <a href="${product.link}" target="_blank" rel="noreferrer">
                    <div class="product-card">
                      <div class="product-image-box">
                        <img src="${product.image}" alt="${product.name}">
                      </div>
                      <p class="product-name">${product.name}</p>
                    </div>
                  </a>
                `).join("")}
              </section>
            ` : `
              <div class="empty-box">
                <p>Products coming soon</p>
                <p>This look page is ready. Add the product list and product images to complete it.</p>
              </div>
            `}
          </main>
        </div>
      `;
    }

    function render() {
      const slug = getSlugFromHash();
      const look = LOOKS.find(item => item.slug === slug);
      const app = document.getElementById("app");
      app.innerHTML = look ? renderLook(look) : renderHome();
    }

    window.addEventListener("hashchange", render);
    render();
  </script>
</body>
